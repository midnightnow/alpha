<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA Visor - The Paddock of Primes</title>
    <link rel="stylesheet" href="visor.css">
</head>

<body>

    <!-- THE SOVEREIGN HUD (THE 93-NODE SIGNATURE) -->
    <div id="sov-hud">
        <div class="hud-item">EM: <span id="hud-em">--</span></div>
        <div class="hud-item">GR: <span id="hud-gr">--</span></div>
        <div class="hud-item">QM: <span id="hud-qm">--</span></div>
        <div id="hud-prime">POWER GLYPH ACTIVE</div>
        <div id="hud-tick">TICK: <span id="tick-val">000</span></div>
    </div>

    <!-- THE GHOSTLY 93-BIT HEX -->
    <div id="hex-header">0x1F01BC1FF507F805ED8210E2</div>

    <!-- THE PROJECTION CAVITY (THE 42° APERTURE) -->
    <div class="visor-container">
        <!-- THE SURE FACE (WHERE THE 156-TICK CYCLE PRINTS) -->
        <canvas id="visor-canvas"></canvas>
    </div>

    <!-- THE SECRET CONTROLS (THE HINGE OF THE GLASSES) -->
    <div class="geometry-controls">
        <div class="control-group">
            <label>NODAL INFLATION SET:</label>
            <select id="select-set">
                <option value="TRIANGLE">SET TRIANGLES (3->93)</option>
                <option value="SQUARE">SET SQUARES (4->124)</option>
                <option value="PENTAGON">SET PENTAGONS (5->155)</option>
            </select>
        </div>
        <div class="control-group">
            <label>HARDENING (SOFT -> EMERALD):</label>
            <input type="range" id="range-hardening" min="0" max="1" step="0.01" value="0.5">
        </div>
        <button id="btn-disturb">INTRODUCE RUSSET (HYSTERESIS)</button>
        <button id="btn-repair" disabled>ENGAGE AUTO-REPAIR TAUTENER</button>
    </div>

    <script src="visor.js"></script>
</body>

</html>
