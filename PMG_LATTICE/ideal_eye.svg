<svg width="500" height="600" viewBox="0 0 500 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#050505" />
  
  <!-- Titles -->
  <text x="250" y="30" font-family="Courier New" font-size="16" fill="#FFFFFF" text-anchor="middle">THE IDEAL EYE: REFRACTION ENGINE (v1.5)</text>
  
  <!-- PHYSICAL MANIFOLD (CONE) -->
  <path d="M 150 50 L 250 250 L 350 50" fill="none" stroke="#4a4a4a" stroke-width="2" stroke-dasharray="5,5" />
  <text x="260" y="150" font-family="Courier New" font-size="12" fill="#888888">MOD-24 CONE</text>
  <text x="260" y="170" font-family="Courier New" font-size="12" fill="#888888">ASP'S TAIL</text>
  
  <!-- THE SNAKE (SPIRAL) -->
  <path d="M 350 50 Q 200 100 300 150 T 250 250" fill="none" stroke="#00FF00" stroke-width="2" />
  <circle cx="250" cy="250" r="4" fill="#00FF00" />
  <text x="260" y="240" font-family="Courier New" font-size="10" fill="#00FF00">HEAD (PUPIL)</text>
  
  <!-- THE APERTURE (YIN YANG PUPIL) -->
  <circle cx="250" cy="250" r="30" fill="none" stroke="#FFFFFF" stroke-width="2" />
  <circle cx="250" cy="250" r="10" fill="#000000" stroke="#FFFFFF" stroke-width="1" />
  <text x="290" y="255" font-family="Courier New" font-size="12" fill="#FFFFFF">-1/12 VACUUM</text>
  <line x1="250" y1="250" x2="250" y2="280" stroke="#FFFFFF" stroke-width="1" />
  
  <!-- IDEAL GLOBE (RETINA) -->
  <circle cx="250" cy="400" r="100" fill="none" stroke="#0088FF" stroke-width="2" />
  <text x="250" y="380" font-family="Courier New" font-size="14" fill="#0088FF" text-anchor="middle">IDEAL GLOBE (1-INCH)</text>
  
  <!-- HERO 93 POINTS (RETINA) -->
  <circle cx="250" cy="450" r="2" fill="#FF0000" />
  <circle cx="200" cy="400" r="2" fill="#FF0000" />
  <circle cx="300" cy="400" r="2" fill="#FF0000" />
  <circle cx="250" cy="350" r="2" fill="#FF0000" />
  <text x="250" y="480" font-family="Courier New" font-size="12" fill="#FF0000" text-anchor="middle">HERO 93 RECORD</text>
  
  <!-- LIGHT PATHS -->
  <!-- Integer Path (Bounce Back) -->
  <path d="M 250 250 L 250 450" stroke="#FFFF00" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 250 450 Q 300 450 250 250" fill="none" stroke="#FFFF00" stroke-width="1" stroke-dasharray="2,2" />
  <text x="260" y="350" font-family="Courier New" font-size="10" fill="#FFFF00">INTEGER (BOUNCE)</text>
  
  <!-- Irrational Path (Escape) -->
  <line x1="250" y1="250" x2="150" y2="550" stroke="#555555" stroke-width="1" stroke-dasharray="2,2" />
  <text x="160" y="540" font-family="Courier New" font-size="10" fill="#555555">IRRATIONAL (ESCAPE)</text>
  
  <!-- Labels -->
  <text x="50" y="100" font-family="Courier New" font-size="12" fill="#AAAAAA">PHYSICAL</text>
  <text x="50" y="250" font-family="Courier New" font-size="12" fill="#FFFFFF">APERTURE</text>
  <text x="50" y="400" font-family="Courier New" font-size="12" fill="#0088FF">IDEAL</text>
  
  <!-- Definition for Arrowhead -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FFFF00" />
    </marker>
  </defs>
</svg>
